<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AppsMlsc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 md:p-10 shadow-2xl space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-emerald-400">AppsMlsc</h1>
            <p class="text-sm text-slate-400 font-medium">Designer Toolkit & Ecosystem</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-xs font-semibold uppercase tracking-wider text-slate-400">Email Desainer</label>
                <input type="email" id="email" required 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200" 
                    placeholder="nama@studio.com">
            </div>

            <div class="space-y-2">
                <label for="password" class="text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
                <input type="password" id="password" required 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200" 
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-semibold text-sm py-4 rounded-xl shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20 active:scale-[0.99] transition duration-200">
                Masuk ke Dashboard
            </button>
        </form>

        <p class="text-center text-xs text-slate-500">
            Pastikan akun Anda sudah terdaftar di database utama.
        </p>
    </div>

    <script>
        // Simulasi Login Sederhana sebelum diarahkan ke dashboard
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Simpan session login sederhana di lokal browser
            localStorage.setItem('appsmlsc_logged_in', 'true');
            localStorage.setItem('appsmlsc_user', document.getElementById('email').value);
            
            // Alihkan ke halaman dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
