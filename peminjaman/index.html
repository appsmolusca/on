<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peminjaman Barang - Inventory (Google Sheets)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } 
        /* Custom Scrollbar for list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F4F6F8] pb-20" onload="initApp()">

    <script>
        // ==========================================
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwf6n7wVcE4wWr2P4p4QfIAG20Yp3UxNnPF_7kKhgmGVX7Zj8NRmANKNJrukjFRf8bnsA/exec";

        function initApp() {
            // Update jam realtime di header
            setInterval(() => {
                document.getElementById('realtimeClock').innerText = new Date().toLocaleString('id-ID', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            }, 1000);
            
            loadData(); // Load data pertama kali
        }

        // Format Waktu
        function getWaktuSekarang() {
            const now = new Date();
            return now.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        }

        // Generate ID Unik (Pengganti Firebase Key)
        function generateId() {
            return 'ID-' + Date.now();
        }

        // Fungsi Helper untuk memanggil Google Sheets API
        async function fetchSheet(payload) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("Error:", error);
                alert("Gagal terhubung ke server.");
            }
        }

        // Fungsi Pinjam Barang (Submit Form)
        async function pinjamBarang(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> Menyimpan...`;
            btnSubmit.disabled = true;

            const dataPeminjaman = {
                action: "insert",
                id: generateId(),
                peminjam: document.getElementById('inputPeminjam').value,
                barang: document.getElementById('inputBarang').value,
                pemberi: document.getElementById('inputPemberi').value,
                penanggungJawab: document.getElementById('inputPenanggungJawab').value,
                waktuPinjam: getWaktuSekarang(),
                waktuKembali: "-",
                status: "dipinjam",
                timestamp: Date.now()
            };

            await fetchSheet(dataPeminjaman);
            
            alert("Barang berhasil dicatat sedang dipinjam!");
            document.getElementById('formPeminjaman').reset();
            btnSubmit.innerHTML = `Catat Peminjaman`;
            btnSubmit.disabled = false;
            
            loadData(); // Refresh UI
        }

        // Fungsi Kembalikan Barang
        async function kembalikanBarang(id, namaBarang) {
            if(confirm(`Tandai "${namaBarang}" sudah dikembalikan?`)) {
                
                // Ubah tulisan tombol jadi loading
                const btn = document.getElementById(`btn-kembali-${id}`);
                btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> Memproses...`;

                await fetchSheet({
                    action: "update",
                    id: id,
                    status: 'dikembalikan',
                    waktuKembali: getWaktuSekarang()
                });
                
                loadData(); // Refresh UI
            }
        }

        // Fungsi Hapus Riwayat
        async function hapusRiwayat(id) {
            if(confirm("Hapus data riwayat ini permanen?")) {
                await fetchSheet({
                    action: "delete",
                    id: id
                });
                loadData(); // Refresh UI
            }
        }

        // Load Data & Render UI
        async function loadData() {
            document.getElementById('listAktif').innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl text-slate-400 font-bold text-xs"><i class="ph-bold ph-spinner animate-spin text-2xl"></i><br>Menarik data dari Google Sheets...</div>`;
            
            const data = await fetchSheet({ action: "read" });
            
            let aktifHTML = '';
            let riwayatHTML = '';
            let jumlahAktif = 0;

            if (data && data.length > 0) {
                // Urutkan data terbaru di atas berdasarkan timestamp
                const arrayData = data.sort((a, b) => b.timestamp - a.timestamp);

                arrayData.forEach(item => {
                    if (item.status === 'dipinjam') {
                        jumlahAktif++;
                        aktifHTML += `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                            <div class="absolute top-0 right-0 bg-orange-100 text-orange-600 px-3 py-1 rounded-bl-xl text-[10px] font-black uppercase flex items-center gap-1">
                                <i class="ph-fill ph-clock-countdown"></i> Belum Kembali
                            </div>
                            
                            <div class="mt-2 mb-3 flex justify-between items-start pr-24">
                                <div>
                                    <h3 class="text-lg font-black text-slate-800 leading-tight">${item.barang}</h3>
                                    <div class="text-[10px] font-bold text-slate-400 mt-1 flex items-center gap-1">
                                        <i class="ph-fill ph-calendar-check"></i> Dipinjam: ${item.waktuPinjam}
                                    </div>
                                </div>
                                <button onclick="hapusRiwayat('${item.id}')" class="text-[10px] text-red-500 bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg font-bold flex items-center gap-1 transition shadow-sm border border-red-100">
                                    <i class="ph-fill ph-trash"></i> Hapus
                                </button>
                            </div>

                            <div class="grid grid-cols-2 gap-2 mb-4 bg-slate-50 p-2.5 rounded-xl text-xs">
                                <div>
                                    <span class="block text-[9px] text-slate-400 font-bold uppercase mb-0.5">Peminjam</span>
                                    <span class="font-black text-slate-700"><i class="ph-fill ph-user-circle text-blue-500"></i> ${item.peminjam}</span>
                                </div>
                                <div>
                                    <span class="block text-[9px] text-slate-400 font-bold uppercase mb-0.5">Diserahkan Oleh</span>
                                    <span class="font-black text-slate-700">${item.pemberi}</span>
                                </div>
                                <div class="col-span-2 pt-1 border-t border-slate-200 mt-1">
                                    <span class="block text-[9px] text-slate-400 font-bold uppercase mb-0.5">Tanggung Jawab (Atas Nama)</span>
                                    <span class="font-black text-slate-700"><i class="ph-fill ph-shield-check text-green-500"></i> ${item.penanggungJawab}</span>
                                </div>
                            </div>

                            <button id="btn-kembali-${item.id}" onclick="kembalikanBarang('${item.id}', '${item.barang}')" class="w-full bg-slate-900 hover:bg-slate-800 transition text-white py-2.5 rounded-xl text-[11px] font-black uppercase flex justify-center items-center gap-2 shadow-md">
                                <i class="ph-bold ph-check-circle text-base text-green-400"></i> Tandai Sudah Dikembalikan
                            </button>
                        </div>
                        `;
                    } else {
                        riwayatHTML += `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm opacity-80 hover:opacity-100 transition">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-sm font-black text-slate-700 line-through decoration-slate-300 decoration-2">${item.barang}</h3>
                                    <div class="text-[10px] font-bold text-slate-500 mt-0.5">Oleh: ${item.peminjam}</div>
                                </div>
                                <span class="bg-green-100 text-green-700 px-2 py-1 rounded-lg text-[9px] font-black uppercase"><i class="ph-fill ph-check-circle"></i> Aman</span>
                            </div>
                            <div class="bg-green-50 text-[10px] text-green-700 font-bold p-2 rounded-lg flex items-center gap-1 mb-2">
                                <i class="ph-fill ph-info"></i> Dikembalikan pd: ${item.waktuKembali}
                            </div>
                            <div class="flex justify-end">
                                <button onclick="hapusRiwayat('${item.id}')" class="text-[10px] text-red-400 hover:text-red-600 font-bold flex items-center gap-1"><i class="ph-fill ph-trash"></i> Hapus</button>
                            </div>
                        </div>
                        `;
                    }
                });
            }

            // Render ke DOM
            document.getElementById('listAktif').innerHTML = aktifHTML || `<div class="text-center p-6 bg-slate-50 rounded-2xl text-slate-400 font-bold text-xs border border-dashed border-slate-200">Tidak ada barang yang sedang dipinjam. Semuanya aman!</div>`;
            document.getElementById('listRiwayat').innerHTML = riwayatHTML || `<div class="text-center p-4 text-slate-400 font-bold text-xs">Belum ada riwayat.</div>`;
            document.getElementById('countAktif').innerText = jumlahAktif;
        }
    </script>

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 py-4 px-5 border-b border-slate-200 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <i class="ph-bold ph-package text-xl text-white"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-tight text-slate-900 leading-none">Log Barang</h1>
                <div id="realtimeClock" class="text-[9px] font-bold text-slate-400 mt-0.5">Memuat waktu...</div>
            </div>
        </div>
        <a href="../index.html" class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-2 rounded-xl uppercase flex items-center gap-1 hover:bg-slate-200 transition">
            <i class="ph-bold ph-arrow-left"></i> KEMBALI
        </a>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6 mt-2">
        
        <section class="bg-gradient-to-br from-blue-600 to-indigo-800 p-6 rounded-[32px] shadow-lg text-white relative overflow-hidden">
            <i class="ph-fill ph-boxes absolute -right-6 -bottom-6 text-9xl opacity-20 pointer-events-none"></i>
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-200 mb-1">Status Keamanan Barang</h3>
                    <div class="text-3xl font-black tracking-tighter flex items-end gap-2">
                        <span id="countAktif">0</span>
                        <span class="text-sm text-blue-200 mb-1 font-bold">Barang di Luar</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-[28px] shadow-sm border border-slate-100">
            <h2 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-4 flex items-center gap-2"><i class="ph-fill ph-plus-circle text-blue-500 text-lg"></i> Form Pinjam Barang</h2>
            <form id="formPeminjaman" onsubmit="pinjamBarang(event)" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1">Nama Peminjam</label>
                        <input type="text" id="inputPeminjam" required placeholder="Siapa yg pinjam?" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition placeholder-slate-300">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1">Nama Barang</label>
                        <input type="text" id="inputBarang" required placeholder="Cth: Kamera Sony" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition placeholder-slate-300">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1">Diberikan Oleh</label>
                        <input type="text" id="inputPemberi" required placeholder="Yg menyerahkan" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition placeholder-slate-300">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-1">Atas Nama (PJ)</label>
                        <input type="text" id="inputPenanggungJawab" required placeholder="Tanggung jawab siapa?" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition placeholder-slate-300">
                    </div>
                </div>

                <button id="btnSubmit" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 flex justify-center items-center gap-2 text-white p-3 rounded-xl text-xs font-black uppercase mt-2 shadow-md shadow-blue-500/30 transition disabled:opacity-50">
                    Catat Peminjaman
                </button>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-xs font-black text-slate-900 uppercase tracking-widest flex items-center gap-2">
                    <i class="ph-fill ph-warning-circle text-orange-500 text-lg"></i> Sedang Dipinjam
                </h2>
            </div>
            <div id="listAktif" class="space-y-3">
                </div>
        </section>

        <section class="pt-6 border-t border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-1 flex items-center gap-2">
                <i class="ph-fill ph-check-square-offset text-lg"></i> Riwayat Dikembalikan
            </h2>
            <div id="listRiwayat" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                </div>
        </section>

    </main>
</body>
</html>
