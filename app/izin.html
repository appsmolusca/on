<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Izin & Sakit - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } 
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#FBFBFE] pb-24 text-slate-800" onload="initApp()" oncontextmenu="return false;">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex justify-center items-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 text-center max-w-[250px]">
            <i class="ph ph-spinner animate-spin text-5xl text-red-500"></i>
            <div>
                <span class="text-xs font-black text-slate-700 uppercase tracking-widest block mb-1">Sinkronisasi Data</span>
                <span class="text-[10px] font-bold text-slate-400">Menghubungkan ke Sheets...</span>
            </div>
            <button onclick="document.getElementById('loadingOverlay').classList.add('hidden')" class="mt-2 text-[9px] font-black uppercase text-red-400 hover:text-red-600 tracking-widest border-b border-red-200 pb-0.5">Tutup Paksa</button>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-4 md:px-6 border-b border-slate-100 flex flex-wrap gap-4 justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-first-aid text-2xl text-red-500"></i>
            <h1 class="text-sm font-extrabold tracking-widest text-slate-900 uppercase">MOLUSCA <span class="text-slate-300 mx-1 hidden md:inline">|</span> <span id="headerName" class="text-red-500 hidden md:inline">USER</span></h1>
        </div>
        <div class="flex items-center gap-1.5 md:gap-2 flex-wrap justify-end w-full md:w-auto" id="navMenu">
            <a href="izin.html" class="text-[10px] md:text-xs font-black bg-red-100 text-red-700 px-3 md:px-4 py-2 md:py-2.5 rounded-xl flex items-center gap-1 uppercase tracking-widest cursor-default shadow-sm border border-red-200"><i class="ph-fill ph-first-aid text-sm md:text-base"></i> <span class="hidden sm:inline">Izin</span></a>
            <a href="piket.html" id="navPiket" class="text-[10px] md:text-xs font-black bg-orange-50 hover:bg-orange-100 text-orange-500 px-3 md:px-4 py-2 md:py-2.5 rounded-xl flex items-center gap-1 transition uppercase tracking-widest"><i class="ph-fill ph-broom text-sm md:text-base"></i> <span class="hidden sm:inline">Piket</span></a>
            <a href="peminjaman.html" id="navAsset" class="text-[10px] md:text-xs font-black bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 md:px-4 py-2 md:py-2.5 rounded-xl flex items-center gap-1 transition uppercase tracking-widest"><i class="ph-fill ph-package text-sm md:text-base"></i> <span class="hidden sm:inline">Inventaris</span></a>
            
            <button onclick="goBack()" class="text-[10px] md:text-xs font-black bg-slate-900 hover:bg-slate-800 text-white px-3 md:px-4 py-2 md:py-2.5 rounded-xl flex items-center gap-1 transition uppercase tracking-widest shadow-md"><i class="ph-bold ph-kanban text-sm md:text-base"></i> <span class="hidden sm:inline">Dashboard</span></button>
        </div>
    </header>

    <main class="p-4 md:p-8 max-w-6xl mx-auto space-y-8 mt-2">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            
            <section class="lg:col-span-5 bg-white p-5 md:p-8 rounded-[32px] border border-slate-100 shadow-sm h-fit order-2 lg:order-1">
                <h2 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest mb-6 flex items-center gap-2">
                    <i class="ph-fill ph-hand-waving text-red-500 text-xl"></i> Form Pengajuan
                </h2>
                <form id="leaveForm" onsubmit="submitLeave(event)" class="space-y-4">
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Pilih Karyawan</label>
                            <div class="relative">
                                <i class="ph-fill ph-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <select id="employeeName" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-10 pr-4 text-xs font-bold outline-none appearance-none focus:ring-2 focus:ring-red-500/20 cursor-pointer"></select>
                                <i class="ph-bold ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Kategori</label>
                            <div class="relative">
                                <i class="ph-fill ph-tag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <select id="leaveType" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-10 pr-4 text-xs font-bold outline-none appearance-none focus:ring-2 focus:ring-red-500/20 cursor-pointer">
                                    <option value="Sakit">Sakit</option>
                                    <option value="Izin">Izin Keperluan</option>
                                    <option value="Cuti">Cuti</option>
                                </select>
                                <i class="ph-bold ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-1">
                        <div class="relative">
                            <label class="absolute -top-2.5 left-4 bg-white px-2 text-[9px] font-black text-slate-400 uppercase tracking-widest rounded shadow-sm border border-slate-100">Mulai</label>
                            <input type="date" id="startDate" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 px-4 text-xs font-bold text-slate-600 focus:ring-2 focus:ring-red-500/20 outline-none appearance-none">
                        </div>
                        <div class="relative">
                            <label class="absolute -top-2.5 left-4 bg-white px-2 text-[9px] font-black text-slate-400 uppercase tracking-widest rounded shadow-sm border border-slate-100">Sampai</label>
                            <input type="date" id="endDate" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 px-4 text-xs font-bold text-slate-600 focus:ring-2 focus:ring-red-500/20 outline-none appearance-none">
                        </div>
                    </div>

                    <div class="relative pt-1">
                        <i class="ph-fill ph-text-align-left absolute left-4 top-4 text-slate-400"></i>
                        <textarea id="leaveReason" required placeholder="Alasan lengkap..." rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 pl-10 pr-4 text-xs font-bold focus:ring-2 focus:ring-red-500/20 outline-none resize-none"></textarea>
                    </div>

                    <div class="relative">
                        <input type="file" id="proofImage" accept="image/*" class="hidden" onchange="previewFile()">
                        <label for="proofImage" class="flex flex-col items-center justify-center w-full bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl py-6 cursor-pointer hover:bg-slate-100 hover:border-red-400 transition-all group">
                            <i id="uploadIcon" class="ph-fill ph-image text-3xl text-slate-300 mb-2 group-hover:text-red-400 transition-colors"></i>
                            <span id="uploadText" class="text-[11px] font-bold text-slate-500 text-center px-4">Upload Bukti Foto / Surat Dokter</span>
                            <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">(Opsional / Wajib jika sakit)</span>
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-black uppercase tracking-widest text-[11px] py-4 rounded-2xl shadow-lg shadow-red-200 transition flex justify-center items-center gap-2 mt-4">
                        <i class="ph-fill ph-paper-plane-right text-base"></i> KIRIM PENGAJUAN
                    </button>
                </form>
            </section>

            <div class="lg:col-span-7 space-y-6 md:space-y-8 order-1 lg:order-2">
                <section class="bg-white p-5 md:p-8 rounded-[32px] border border-slate-100 shadow-sm flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest flex items-center gap-2">
                            <i class="ph-fill ph-chart-bar text-blue-500 text-xl"></i> Statistik
                        </h2>
                        <select id="chartMonth" onchange="renderChart()" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-[10px] font-bold outline-none cursor-pointer"></select>
                    </div>
                    <div class="flex-1 w-full relative min-h-[200px] md:min-h-[250px]"><canvas id="statsChart"></canvas></div>
                </section>
                
                <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-6 md:p-8 rounded-[32px] text-white flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-lg">
                    <div>
                        <h3 class="font-black text-sm mb-1 uppercase tracking-widest text-slate-200 flex items-center gap-2">
                            <i class="ph-fill ph-microsoft-excel-logo text-green-400 text-xl"></i> Rekap Data
                        </h3>
                        <p class="text-[10px] text-slate-400">Unduh riwayat pengajuan tim ke format Excel.</p>
                    </div>
                    <button id="btnExport" onclick="downloadExcel()" class="w-full sm:w-auto bg-green-500 hover:bg-green-400 text-white px-6 py-3.5 rounded-xl text-[10px] font-black uppercase flex justify-center items-center gap-2 shadow-md transition">
                        Download .XLSX
                    </button>
                </div>
            </div>
        </div>

        <section class="pt-4 md:pt-6 border-t border-slate-200 mt-8">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2 ml-2">
                <i class="ph-fill ph-clock-counter-clockwise text-lg"></i> Riwayat Pengajuan Seluruh Tim
            </h2>
            <div id="board-history" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
        </section>
    </main>

    <div id="imageModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex justify-center items-center p-4" onclick="closeModal()">
        <img id="modalImg" src="" class="max-w-full max-h-[85vh] rounded-2xl shadow-2xl object-contain">
        <button class="absolute top-4 right-4 md:top-6 md:right-6 text-white bg-white/20 p-2.5 rounded-full hover:bg-white/40 transition"><i class="ph ph-x text-xl"></i></button>
    </div>

    <script>
        // === KONFIGURASI GOOGLE SHEETS & CLOUDINARY ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxowuOA-SAq4m4a5sGRljiP8vp7yPkO5QunSGH8WBOJyKiQyGbp_FyY7A6pNGfY6y0rBg/exec";
        let CLOUD_NAME = localStorage.getItem('molusca_cloud_name') || "";
        const CLOUDINARY_UPLOAD_PRESET = "molusca_izin"; // PERBAIKAN: Menambahkan 'izin' pada preset sesuai konfigurasi awal Anda

        async function dbCall(payload) {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await res.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { status: 'error', data: [] };
            }
        }

        let globalRequestsData = [];
        let globalEmployees = [];
        let myChart = null; 

        const userRole = localStorage.getItem('moluscaRole');
        const userName = localStorage.getItem('moluscaUser');

        function goBack() {
            if(userRole === 'admin') window.location.href = 'dashboard.html';
            else if (userRole === 'konten') window.location.href = 'konten.html';
            else window.location.href = 'desainer.html';
        }

        async function initApp() {
            if(!userName) window.location.href = 'index.html';
            
            document.getElementById('headerName').textContent = userName;

            if(userRole === 'admin') {
                document.getElementById('navPiket').href = 'dashboard-piket.html';
            }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            
            const monthSelect = document.getElementById('chartMonth');
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            months.forEach((m, i) => {
                let isSelected = i === new Date().getMonth() ? 'selected' : '';
                monthSelect.innerHTML += `<option value="${i}" ${isSelected}>${m}</option>`;
            });

            await loadEmployees();
            await loadData();
        }

        async function loadEmployees() {
            try {
                const res = await dbCall({ action: 'read', sheetName: 'users' });
                const select = document.getElementById('employeeName');
                select.innerHTML = '';
                globalEmployees = [];
                
                if(res.status === 'success' && res.data){
                    res.data.forEach(u => {
                        if(u.role && u.role.toLowerCase() !== 'admin') {
                            globalEmployees.push(u.name);
                            let selected = (u.name === userName) ? 'selected' : '';
                            select.innerHTML += `<option value="${u.name}" ${selected}>${u.name}</option>`;
                        }
                    });
                }
                
                if(userRole !== 'admin') {
                    select.value = userName;
                    select.disabled = true;
                    select.classList.add('opacity-50', 'cursor-not-allowed');
                    document.getElementById('btnExport').style.display = 'none';
                }
            } catch(e) {
                console.error("Gagal load karyawan");
            }
        }

        function previewFile() {
            const file = document.getElementById('proofImage').files[0];
            if (file) {
                document.getElementById('uploadText').innerText = file.name;
                document.getElementById('uploadText').className = "text-xs font-bold text-blue-600 text-center px-4";
                document.getElementById('uploadIcon').className = "ph-fill ph-check-circle text-4xl text-blue-500 mb-2";
            }
        }

        async function submitLeave(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('proofImage').files[0];
            
            if (file && !CLOUD_NAME) {
                CLOUD_NAME = prompt("⚠️ MASUKKAN CLOUD NAME akun Cloudinary Anda (Kosongkan jika batal):");
                if (!CLOUD_NAME) return alert("Sistem butuh Cloud Name untuk menyimpan foto.");
                localStorage.setItem('molusca_cloud_name', CLOUD_NAME.trim());
            }

            // PERBAIKAN: sheetName sekarang berisi 'izin' (Sebelumnya kosong)
            const reqData = {
                id: Date.now().toString(),
                name: document.getElementById('employeeName').value,
                type: document.getElementById('leaveType').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                reason: document.getElementById('leaveReason').value,
                proofUrl: "",
                timestamp: new Date().toISOString()
            };

            btn.disabled = true;
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                if (file) {
                    btn.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> UPLOAD FOTO...`;
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
                    const resCloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                    const cloudData = await resCloud.json();
                    if(!resCloud.ok) throw new Error("Gagal upload Cloudinary. Cek Cloud Name.");
                    reqData.proofUrl = cloudData.secure_url;
                }

                btn.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> MENYIMPAN KE SHEETS...`;
                
                // PERBAIKAN: Menambahkan nama sheet 'izin'
                const resInsert = await dbCall({ action: 'insert', sheetName: 'izin', data: reqData });
                
                if (resInsert.status !== 'success') throw new Error("Gagal menyimpan ke Google Sheets");

                document.getElementById('leaveForm').reset();
                if(userRole !== 'admin') document.getElementById('employeeName').value = userName;
                
                // Reset UI File
                document.getElementById('uploadText').innerText = "Upload Bukti Foto / Surat Dokter";
                document.getElementById('uploadText').className = "text-[11px] font-bold text-slate-500 text-center px-4";
                document.getElementById('uploadIcon').className = "ph-fill ph-image text-3xl text-slate-300 mb-2 group-hover:text-red-400 transition-colors";

                alert("Pengajuan berhasil disimpan!");
                await loadData(); 
            } catch (error) {
                alert("Gagal: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="ph-fill ph-paper-plane-right text-base"></i> KIRIM PENGAJUAN`;
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        async function loadData() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                // PERBAIKAN: Menambahkan nama sheet 'izin'
                const response = await dbCall({ action: 'read', sheetName: 'izin' });
                if(response.status === 'success') {
                    globalRequestsData = response.data || [];
                    renderBoard(globalRequestsData);
                    renderChart(); 
                }
            } catch(e) {
                console.error(e);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        // PERBAIKAN: Nama fungsi delete() menjadi deleteIzin() (karena delete adalah kata terlarang)
        async function deleteIzin(id) {
            if(confirm('Yakin ingin hapus riwayat izin ini permanen?')) {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                await dbCall({ action: 'delete', sheetName: 'izin', idValue: id });
                await loadData(); 
            }
        }

        function renderChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            const selectedMonth = parseInt(document.getElementById('chartMonth').value);
            
            let stats = {};
            // PERBAIKAN: Memasukkan kembali kata "Izin" yang hilang
            globalEmployees.forEach(emp => stats[emp] = { Sakit: 0, Izin: 0, Cuti: 0 });

            globalRequestsData.forEach(req => {
                let reqDate = new Date(req.startDate);
                if(!isNaN(reqDate.getTime()) && reqDate.getMonth() === selectedMonth) {
                    if (!stats[req.name]) stats[req.name] = { Sakit: 0, Izin: 0, Cuti: 0 };
                    
                    // Normalisasi huruf besar/kecil dari input (contoh: "Izin Keperluan" disederhanakan jadi "Izin")
                    let typeKey = req.type.includes('Sakit') ? 'Sakit' : (req.type.includes('Cuti') ? 'Cuti' : 'Izin');
                    stats[req.name][typeKey] += 1; 
                }
            });

            const labels = Object.keys(stats);
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sakit', data: labels.map(n => stats[n].Sakit), backgroundColor: '#ef4444', borderRadius: 4 },
                        { label: 'Izin', data: labels.map(n => stats[n].Izin), backgroundColor: '#eab308', borderRadius: 4 },
                        { label: 'Cuti', data: labels.map(n => stats[n].Cuti), backgroundColor: '#a855f7', borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }, 
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { ticks: { font: { size: 10 } } } } 
                }
            });
        }

        function renderBoard(requests) {
            const board = document.getElementById('board-history');
            board.innerHTML = '';
            
            if(requests.length === 0) {
                board.innerHTML = `<div class="col-span-full text-center text-xs font-bold text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-[32px] bg-slate-50/50">Belum ada data pengajuan.</div>`;
                return;
            }

            requests.sort((a, b) => b.id - a.id).forEach(req => {
                let badgeColor = req.type.includes('Sakit') ? 'bg-red-50 text-red-600 border-red-200' : req.type.includes('Cuti') ? 'bg-purple-50 text-purple-600 border-purple-200' : 'bg-amber-50 text-amber-600 border-amber-200';
                let delBtn = userRole === 'admin' ? `<button onclick="deleteIzin('${req.id}')" class="text-slate-300 hover:text-red-500 transition bg-white shadow-sm border border-slate-100 p-1.5 rounded-lg"><i class="ph-fill ph-trash text-lg"></i></button>` : '';

                let proofBtn = req.proofUrl ? 
                    `<button onclick="openModal('${req.proofUrl}')" class="mt-4 w-full bg-slate-50 hover:bg-slate-100 text-blue-600 text-[10px] font-extrabold p-3.5 rounded-xl uppercase tracking-widest flex justify-center items-center gap-2 transition-colors border border-slate-200 shadow-sm"><i class="ph-bold ph-image text-base"></i> Lihat Bukti Foto</button>` : '';

                board.innerHTML += `
                    <div class="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm relative hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 font-black text-sm uppercase shadow-sm">${req.name.charAt(0)}</div>
                                    <div>
                                        <h3 class="font-black text-slate-800 text-sm leading-tight">${req.name}</h3>
                                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"><i class="ph-fill ph-clock"></i> ${new Date(parseInt(req.id)).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                    </div>
                                </div>
                                ${delBtn}
                            </div>
                            <div class="mb-4 flex flex-wrap items-center gap-2">
                                <span class="text-[9px] font-black uppercase px-2.5 py-1 rounded-md border ${badgeColor}">${req.type}</span>
                                <span class="text-[9px] font-bold text-slate-500 bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100">
                                    <i class="ph-fill ph-calendar-blank"></i> ${new Date(req.startDate).toLocaleDateString('id-ID', {day:'2-digit', month:'short'})}
                                </span>
                            </div>
                            <p class="text-xs font-medium text-slate-600 bg-slate-50 p-4 rounded-2xl border border-slate-100 leading-relaxed min-h-[60px]">${req.reason}</p>
                        </div>
                        ${proofBtn}
                    </div>
                `;
            });
        }

        function openModal(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('imageModal').classList.add('hidden'); }

        function downloadExcel() {
            if(globalRequestsData.length === 0) return alert("Belum ada data.");
            const workbook = XLSX.utils.book_new();
            
            const detailData = globalRequestsData.sort((a, b) => b.id - a.id).map((req, i) => ({
                "No": i + 1, "Nama Karyawan": req.name, "Tipe Izin": req.type,
                "Dari Tanggal": new Date(req.startDate).toLocaleDateString('id-ID'), "Sampai Tanggal": new Date(req.endDate).toLocaleDateString('id-ID'),
                "Alasan Lengkap": req.reason, "Link Bukti Foto": req.proofUrl || "Tidak Ada"
            }));
            const wsDetail = XLSX.utils.json_to_sheet(detailData);
            wsDetail['!cols'] = [ {wch: 5}, {wch: 20}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 40}, {wch: 50} ];
            XLSX.utils.book_append_sheet(workbook, wsDetail, "Data Detail");

            // PERBAIKAN EXCEL: Mengembalikan kata "Izin" yang terhapus
            let rekapStats = {};
            globalEmployees.forEach(emp => rekapStats[emp] = { Sakit: 0, Izin: 0, Cuti: 0, Total: 0 });
            
            globalRequestsData.forEach(req => {
                if (!rekapStats[req.name]) rekapStats[req.name] = { Sakit: 0, Izin: 0, Cuti: 0, Total: 0 };
                let typeKey = req.type.includes('Sakit') ? 'Sakit' : (req.type.includes('Cuti') ? 'Cuti' : 'Izin');
                rekapStats[req.name][typeKey] += 1; 
                rekapStats[req.name].Total += 1;
            });

            const rekap = [["Nama Pegawai", "Total Sakit", "Total Izin", "Total Cuti", "TOTAL SEMUA"]];
            for (const [name, d] of Object.entries(rekapStats)) rekap.push([name, d.Sakit, d.Izin, d.Cuti, d.Total]);
            const wsRekap = XLSX.utils.aoa_to_sheet(rekap);
            wsRekap['!cols'] = [ {wch: 20}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15} ];
            XLSX.utils.book_append_sheet(workbook, wsRekap, "Rekapitulasi");

            XLSX.writeFile(workbook, `Rekap_Izin_Molusca.xlsx`);
        }
    </script>
</body>
</html>
