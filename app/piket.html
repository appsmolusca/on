<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket & Kas - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        // === GOOGLE SHEETS API ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxowuOA-SAq4m4a5sGRljiP8vp7yPkO5QunSGH8WBOJyKiQyGbp_FyY7A6pNGfY6y0rBg/exec";
        
        async function dbCall(payload) {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await res.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { status: 'error', data: [] };
            }
        }

        // Jadwal & List Tim
        const jadwalPiket = { 1: ['Indah'], 2: ['Nazma'], 3: ['Nayla'], 4: ['Feyy'], 5: ['Dadan'], 6: ['Tya', 'Opik'], 0: [] };
        const listTim = ['Dadan', 'Indah', 'Tya', 'Nayla', 'Opik', 'Feyy', 'Nazma'];
        
        const todayStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        const dayIndex = new Date().getDay();
        
        let globalPiketData = [];

        function initApp() {
            if (localStorage.getItem('moluscaPiketUser') !== 'tim') window.location.href = 'index.html';
            document.getElementById('tanggalHariIni').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const selectUser = document.getElementById('kbUser');
            listTim.forEach(nama => selectUser.innerHTML += `<option value="${nama}">${nama}</option>`);

            loadData();
        }

        function formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka); }

        async function loadData() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            // 1. Ambil Semua Data
            const [resPiket, resKasbon] = await Promise.all([
                dbCall({ action: 'read', sheetName: 'piket_log' }),
                dbCall({ action: 'read', sheetName: 'kasbon' })
            ]);

            globalPiketData = resPiket.status === 'success' && resPiket.data ? resPiket.data : [];
            const kasbonData = resKasbon.status === 'success' && resKasbon.data ? resKasbon.data : [];

            // 2. Inisialisasi Piket Hari Ini (Jika belum ada di DB)
            await initTodayPiket();

            // 3. Render UI
            renderPiket();
            renderDenda();
            renderKasbon(kasbonData);
            
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        async function initTodayPiket() {
            const petugas = jadwalPiket[dayIndex];
            if (!petugas || petugas.length === 0) return;

            let todayLogs = globalPiketData.filter(d => d.dateStr === todayStr);
            let needsRefresh = false;

            for (let name of petugas) {
                let exists = todayLogs.find(d => d.name === name);
                if (!exists) {
                    await dbCall({
                        action: 'insert', sheetName: 'piket_log',
                        data: { id: `${todayStr}_${name}`, dateStr: todayStr, name: name, status: 'belum' }
                    });
                    needsRefresh = true;
                }
            }

            // Jika ada yang baru diinsert, tarik data ulang secara senyap
            if(needsRefresh) {
                const refresh = await dbCall({ action: 'read', sheetName: 'piket_log' });
                if(refresh.status === 'success') globalPiketData = refresh.data;
            }
        }

        async function absenPiket(namaYangPiket, btnId) {
            if(confirm(`Yakin ${namaYangPiket} sudah bersih-bersih?`)) {
                const btn = document.getElementById(btnId);
                btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Loading...';
                
                await dbCall({ 
                    action: 'update', sheetName: 'piket_log', 
                    idValue: `${todayStr}_${namaYangPiket}`, 
                    updateData: { status: 'sudah' } 
                });
                loadData(); // Refresh UI
            }
        }

        async function ajukanKasbon(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Mengirim...'; btn.disabled = true;

            const id = Date.now().toString();
            const namaPemohon = document.getElementById('kbUser').value; 
            
            await dbCall({
                action: 'insert', sheetName: 'kasbon',
                data: {
                    id: id, name: namaPemohon, amount: parseInt(document.getElementById('kbAmount').value),
                    reason: document.getElementById('kbReason').value, dateStr: todayStr, status: 'Menunggu'
                }
            });

            document.getElementById('formKasbon').reset();
            btn.innerHTML = '<i class="ph-fill ph-paper-plane-right"></i> Kirim Pengajuan'; btn.disabled = false;
            alert(`Pengajuan kasbon atas nama ${namaPemohon} berhasil terkirim!`);
            loadData();
        }

        function renderPiket() {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            const petugas = jadwalPiket[dayIndex];
            if (petugas.length === 0) { list.innerHTML = `<div class="text-center p-4 bg-slate-50 text-slate-400 font-bold text-xs rounded-2xl border border-dashed">Hari ini libur piket.</div>`; return; }

            const todayLogs = globalPiketData.filter(d => d.dateStr === todayStr);

            petugas.forEach((name, index) => {
                let log = todayLogs.find(d => d.name === name);
                let status = log ? log.status : 'belum';
                let ui = '';

                let btnId = `btn-absen-${index}`;

                if (status === 'sudah') ui = `<span class="bg-green-100 text-green-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-green-200"><i class="ph-fill ph-check-circle"></i> Selesai Piket</span>`;
                else if (status === 'denda_belum') ui = `<span class="bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Didenda Bos (Belum Bayar)</span>`;
                else if (status === 'denda_lunas' || status === 'denda') ui = `<span class="bg-orange-100 text-orange-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Denda Lunas</span>`;
                else ui = `<button id="${btnId}" onclick="absenPiket('${name}', '${btnId}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md transition flex gap-1 items-center"><i class="ph-fill ph-hand-pointing"></i> Klik Absen</button>`;

                list.innerHTML += `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center"><h4 class="font-black text-slate-700 flex items-center gap-2"><i class="ph-fill ph-user-circle text-blue-500 text-xl"></i> ${name}</h4>${ui}</div>`;
            });
        }

        function renderDenda() {
            const list = document.getElementById('denda-list');
            list.innerHTML = '';
            
            // Filter: Status Denda Belum ATAU (Belum Absen dan tanggal bukan hari ini)
            const nunggakList = globalPiketData.filter(d => d.status === 'denda_belum' || (d.status === 'belum' && d.dateStr !== todayStr));

            if (nunggakList.length === 0) {
                list.innerHTML = `<div class="text-center p-4 bg-green-50 text-green-600 font-bold text-xs rounded-2xl border border-dashed border-green-200">Aman! Tidak ada tim yang nunggak denda. 🎉</div>`;
                return;
            }

            nunggakList.forEach(item => {
                list.innerHTML += `
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100 flex justify-between items-center shadow-sm">
                        <div>
                            <h4 class="font-black text-red-700 flex items-center gap-1"><i class="ph-fill ph-warning-circle"></i> ${item.name}</h4>
                            <div class="text-[9px] font-bold text-red-400 mt-1 uppercase tracking-widest"><i class="ph ph-calendar-blank"></i> Tgl Bolos: ${item.dateStr}</div>
                        </div>
                        <span class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm flex items-center gap-1">Ngutang 5k</span>
                    </div>
                `;
            });
        }

        function renderKasbon(data) {
            const list = document.getElementById('kasbon-list');
            list.innerHTML = '';
            if(data.length === 0) { list.innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl text-slate-400 font-bold text-xs border border-dashed">Belum ada riwayat pengajuan.</div>`; return; }

            data.reverse().forEach(item => {
                let badge = item.status === 'Menunggu' ? `<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-black uppercase border border-orange-200">Menunggu ACC</span>` : `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[9px] font-black uppercase border border-blue-200">Disetujui</span>`;
                list.innerHTML += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm"><div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-slate-900">${item.name}</h4><div class="text-[9px] font-bold text-slate-400 uppercase">${item.dateStr}</div></div>${badge}</div><div class="text-xl font-black text-slate-800 tracking-tighter mb-1">${formatRupiah(item.amount)}</div><div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl italic">"${item.reason}"</div></div>`;
            });
        }

        function logout() { localStorage.removeItem('moluscaPiketUser'); window.location.href = 'index.html'; }
    </script>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex justify-center items-center">
        <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-3">
            <i class="ph ph-spinner animate-spin text-4xl text-blue-600"></i>
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Sinkronisasi Data...</span>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-hexagon text-2xl text-blue-600"></i>
            <div><h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">Piket & Kas</h1></div>
        </div>
        <button onclick="goBack()" class="text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl flex items-center gap-1 transition shadow-sm">
                    <i class="ph-fill ph-arrow-left text-lg"></i> Kembali
                </button>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-2 rounded-xl uppercase hover:bg-red-100 flex items-center gap-1 transition"><i class="ph-fill ph-sign-out"></i> LOGOUT</button>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8 mt-2">
        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest"><i class="ph-fill ph-broom text-blue-500"></i> Jadwal Piket Hari Ini</h2>
                <div id="tanggalHariIni" class="text-[9px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded"></div>
            </div>
            <div id="piket-list" class="space-y-3"></div>
        </section>

        <section class="pt-4 border-t border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1 flex items-center gap-2"><i class="ph-fill ph-warning-circle text-lg text-red-500"></i> Daftar Nunggak Denda</h2>
            <div id="denda-list" class="space-y-3"></div>
        </section>

        <section class="bg-slate-900 p-6 rounded-[32px] shadow-xl text-white">
            <h2 class="text-xs font-black uppercase tracking-widest mb-5 flex items-center gap-2"><i class="ph-fill ph-hand-coins text-orange-500 text-lg"></i> Form Kasbon</h2>
            <form id="formKasbon" onsubmit="ajukanKasbon(event)" class="space-y-4">
                <div class="relative">
                    <i class="ph-fill ph-users absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <select id="kbUser" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-12 pr-4 text-white text-sm font-black outline-none appearance-none cursor-pointer"></select>
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">Rp</span>
                    <input type="number" id="kbAmount" required placeholder="Cth: 50000" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-12 pr-4 text-white text-sm font-black outline-none focus:ring-2 focus:ring-orange-500/50">
                </div>
                <div class="relative">
                    <i class="ph-fill ph-text-align-left absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="kbReason" required placeholder="Keperluan..." autocomplete="off" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-10 pr-4 text-white text-xs font-bold outline-none focus:ring-2 focus:ring-orange-500/50">
                </div>
                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl transition uppercase tracking-widest text-[10px] flex justify-center gap-2"><i class="ph-fill ph-paper-plane-right"></i> Kirim Pengajuan</button>
            </form>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1"><i class="ph-fill ph-receipt text-lg"></i> Riwayat Kasbon Tim</h2>
            <div id="kasbon-list" class="space-y-4"></div>
        </section>
    </main>
</body>
</html>
