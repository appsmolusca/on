<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket & Kas - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-24 text-slate-800" onload="initApp()" oncontextmenu="return false;">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex justify-center items-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 text-center max-w-[250px]">
            <i class="ph ph-spinner animate-spin text-5xl text-blue-600"></i>
            <div>
                <span class="text-xs font-black text-slate-700 uppercase tracking-widest block mb-1">Sinkronisasi Data</span>
                <span class="text-[10px] font-bold text-slate-400">Menghubungkan ke Sheets...</span>
            </div>
            <button onclick="document.getElementById('loadingOverlay').classList.add('hidden')" class="mt-2 text-[9px] font-black uppercase text-red-400 hover:text-red-600 tracking-widest border-b border-red-200 pb-0.5 transition-colors">Tutup Paksa</button>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-4 md:px-6 border-b border-slate-100 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="bg-blue-50 text-blue-600 w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center shadow-inner">
                <i class="ph-fill ph-broom text-xl md:text-2xl"></i>
            </div>
            <div>
                <h1 class="text-sm md:text-lg font-extrabold tracking-tight text-slate-900 leading-none">Piket & Kas</h1>
                <span class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Workspace Tim</span>
            </div>
        </div>
        <button onclick="goBack()" class="text-[10px] md:text-xs font-black text-slate-500 bg-slate-100 border border-slate-200 px-4 py-2.5 md:py-3 rounded-xl uppercase flex items-center gap-1.5 hover:bg-slate-200 hover:text-slate-800 transition tracking-widest shadow-sm">
            <i class="ph-bold ph-arrow-left text-sm md:text-lg"></i> <span class="hidden sm:inline">KEMBALI</span>
        </button>
    </header>

    <main class="p-4 md:p-8 max-w-3xl mx-auto space-y-8 md:space-y-10 mt-2">
        
        <section>
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-2 mb-4 md:mb-5 ml-1">
                <h2 class="text-sm md:text-base font-black text-slate-900 uppercase tracking-widest flex items-center gap-2"><i class="ph-fill ph-calendar-check text-blue-500 text-xl"></i> Jadwal Hari Ini</h2>
                <div id="tanggalHariIni" class="text-[10px] md:text-xs font-bold text-slate-500 bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg shadow-sm"></div>
            </div>
            <div id="piket-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>

        <section class="pt-4 md:pt-6 border-t border-slate-200">
            <h2 class="text-xs md:text-sm font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1 flex items-center gap-2"><i class="ph-fill ph-warning-circle text-lg md:text-xl text-red-500"></i> Daftar Nunggak Denda</h2>
            <div id="denda-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>

        <section class="bg-slate-900 p-6 md:p-10 rounded-[32px] shadow-xl shadow-slate-900/20 text-white relative overflow-hidden">
            <i class="ph-fill ph-hand-coins absolute -right-6 -bottom-6 text-9xl md:text-[150px] opacity-5 pointer-events-none"></i>
            <div class="relative z-10">
                <h2 class="text-xs md:text-sm font-black uppercase tracking-widest mb-6 flex items-center gap-2"><i class="ph-fill ph-money text-orange-500 text-xl md:text-2xl"></i> Form Pengajuan Kasbon</h2>
                <form id="formKasbon" onsubmit="ajukanKasbon(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <i class="ph-fill ph-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <select id="kbUser" required class="w-full bg-white/10 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white text-xs md:text-sm font-bold outline-none appearance-none cursor-pointer focus:ring-2 focus:ring-orange-500/50 shadow-inner"></select>
                            <i class="ph-bold ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        </div>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">Rp</span>
                            <input type="number" id="kbAmount" required placeholder="Cth: 50000" class="w-full bg-white/10 border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-white text-xs md:text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500/50 shadow-inner placeholder-white/30">
                        </div>
                    </div>
                    <div class="relative">
                        <i class="ph-fill ph-text-align-left absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" id="kbReason" required placeholder="Keperluan kasbon..." autocomplete="off" class="w-full bg-white/10 border border-white/5 rounded-2xl py-4 md:py-5 pl-12 pr-4 text-white text-xs md:text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500/50 shadow-inner placeholder-white/30">
                    </div>
                    <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 md:py-5 rounded-2xl transition uppercase tracking-widest text-[10px] md:text-xs flex justify-center items-center gap-2 shadow-lg shadow-orange-500/30 mt-2">
                        <i class="ph-fill ph-paper-plane-right text-base md:text-lg"></i> Kirim Pengajuan
                    </button>
                </form>
            </div>
        </section>

        <section class="pt-4 md:pt-6">
            <h2 class="text-xs md:text-sm font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1 flex items-center gap-2"><i class="ph-fill ph-receipt text-lg md:text-xl"></i> Riwayat Kasbon Tim</h2>
            <div id="kasbon-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        // === GOOGLE SHEETS API ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxowuOA-SAq4m4a5sGRljiP8vp7yPkO5QunSGH8WBOJyKiQyGbp_FyY7A6pNGfY6y0rBg/exec";
        
        async function dbCall(payload) {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await res.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { status: 'error', data: [] };
            }
        }

        // Routing Kembali Cerdas (Berdasarkan Role)
        const userRole = localStorage.getItem('moluscaRole');
        const userName = localStorage.getItem('moluscaUser');

        function goBack() {
            if (userRole === 'admin') window.location.href = 'dashboard.html';
            else if (userRole === 'konten') window.location.href = 'konten.html';
            else window.location.href = 'desainer.html';
        }

        // Jadwal & List Tim (Hardcode untuk kecepatan, sesuai request)
        const jadwalPiket = { 1: ['Indah'], 2: ['Nazma'], 3: ['Nayla'], 4: ['Feyy'], 5: ['Dadan'], 6: ['Tya', 'Opik'], 0: [] };
        const listTim = ['Dadan', 'Indah', 'Tya', 'Nayla', 'Opik', 'Feyy', 'Nazma'];
        
        const todayStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        const dayIndex = new Date().getDay();
        
        let globalPiketData = [];

        async function initApp() {
            if (!userName) window.location.href = 'index.html';
            
            document.getElementById('tanggalHariIni').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const selectUser = document.getElementById('kbUser');
            selectUser.innerHTML = '<option value="" disabled selected class="text-slate-900">Pilih Nama Pemohon...</option>';
            listTim.forEach(nama => selectUser.innerHTML += `<option value="${nama}" class="text-slate-900">${nama}</option>`);

            await loadData();
        }

        function formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka); }

        async function loadData() {
            // Anti-Macet Proteksi
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            try {
                const [resPiket, resKasbon] = await Promise.all([
                    dbCall({ action: 'read', sheetName: 'piket_log' }),
                    dbCall({ action: 'read', sheetName: 'kasbon' })
                ]);

                // Filter Data Aman
                globalPiketData = (resPiket.status === 'success' && Array.isArray(resPiket.data)) ? resPiket.data : [];
                const kasbonData = (resKasbon.status === 'success' && Array.isArray(resKasbon.data)) ? resKasbon.data : [];

                await initTodayPiket();

                renderPiket();
                renderDenda();
                renderKasbon(kasbonData);
            } catch (error) {
                console.error("Gagal load data", error);
                alert("Jaringan tidak stabil. Silakan coba lagi.");
            } finally {
                // Di kondisi apapun, loading PASTI ditutup
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        async function initTodayPiket() {
            const petugas = jadwalPiket[dayIndex] || [];
            if (petugas.length === 0) return;

            let todayLogs = globalPiketData.filter(d => d.dateStr === todayStr);
            let needsRefresh = false;

            for (let name of petugas) {
                let exists = todayLogs.find(d => d.name === name);
                if (!exists) {
                    await dbCall({
                        action: 'insert', sheetName: 'piket_log',
                        data: { id: `${todayStr}_${name}`, dateStr: todayStr, name: name, status: 'belum' }
                    });
                    needsRefresh = true;
                }
            }

            if(needsRefresh) {
                const refresh = await dbCall({ action: 'read', sheetName: 'piket_log' });
                if(refresh.status === 'success' && Array.isArray(refresh.data)) globalPiketData = refresh.data;
            }
        }

        async function absenPiket(namaYangPiket, btnId) {
            if(confirm(`Yakin ${namaYangPiket} sudah menyapu dan merapikan studio?`)) {
                const btn = document.getElementById(btnId);
                btn.innerHTML = '<i class="ph ph-spinner animate-spin text-base"></i> Memproses...';
                btn.disabled = true;
                document.getElementById('loadingOverlay').classList.remove('hidden');
                
                await dbCall({ 
                    action: 'update', sheetName: 'piket_log', 
                    idValue: `${todayStr}_${namaYangPiket}`, 
                    updateData: { status: 'sudah' } 
                });
                
                await loadData(); 
            }
        }

        async function ajukanKasbon(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-base md:text-lg"></i> Mengirim...'; 
            btn.disabled = true;
            document.getElementById('loadingOverlay').classList.remove('hidden');

            const id = Date.now().toString();
            const namaPemohon = document.getElementById('kbUser').value; 

            if(!namaPemohon) {
                alert("Harap pilih nama pemohon terlebih dahulu!");
                btn.innerHTML = '<i class="ph-fill ph-paper-plane-right text-base md:text-lg"></i> Kirim Pengajuan'; 
                btn.disabled = false;
                document.getElementById('loadingOverlay').classList.add('hidden');
                return;
            }
            
            await dbCall({
                action: 'insert', sheetName: 'kasbon',
                data: {
                    id: id, name: namaPemohon, amount: parseInt(document.getElementById('kbAmount').value),
                    reason: document.getElementById('kbReason').value, dateStr: todayStr, status: 'Menunggu'
                }
            });

            document.getElementById('formKasbon').reset();
            btn.innerHTML = '<i class="ph-fill ph-paper-plane-right text-base md:text-lg"></i> Kirim Pengajuan'; 
            btn.disabled = false;
            alert(`Pengajuan kasbon atas nama ${namaPemohon} berhasil terkirim ke Bos!`);
            
            await loadData();
        }

        function renderPiket() {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            const petugas = jadwalPiket[dayIndex] || [];
            
            if (petugas.length === 0) { 
                list.innerHTML = `<div class="col-span-full text-center p-6 bg-slate-50 text-slate-400 font-bold text-xs md:text-sm rounded-[24px] border-2 border-dashed border-slate-200">Hari ini libur piket studio.</div>`; 
                return; 
            }

            const todayLogs = globalPiketData.filter(d => d.dateStr === todayStr);

            petugas.forEach((name, index) => {
                let log = todayLogs.find(d => d.name === name);
                let status = log ? log.status : 'belum';
                let ui = '';
                let btnId = `btn-absen-${index}`;

                if (status === 'sudah') ui = `<span class="bg-green-100 text-green-700 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase border border-green-200 flex items-center gap-1.5"><i class="ph-fill ph-check-circle text-sm"></i> Selesai Piket</span>`;
                else if (status === 'denda_belum') ui = `<span class="bg-red-50 text-red-600 px-4 py-2.5 rounded-xl text-[9px] font-black uppercase border border-red-200 flex items-center gap-1.5"><i class="ph-fill ph-warning-circle text-sm"></i> Didenda Bos (Belum Bayar)</span>`;
                else if (status === 'denda_lunas' || status === 'denda') ui = `<span class="bg-orange-50 text-orange-600 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase border border-orange-200 flex items-center gap-1.5"><i class="ph-fill ph-money text-sm"></i> Denda Lunas</span>`;
                else ui = `<button id="${btnId}" onclick="absenPiket('${name}', '${btnId}')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-[10px] md:text-xs font-black uppercase shadow-lg shadow-blue-500/30 transition flex gap-1.5 items-center whitespace-nowrap"><i class="ph-fill ph-hand-pointing text-sm md:text-base"></i> Klik Absen</button>`;

                list.innerHTML += `
                <div class="bg-white p-5 md:p-6 rounded-[24px] border border-slate-100 shadow-sm flex justify-between items-center hover:shadow-md transition">
                    <h4 class="font-black text-slate-800 text-sm md:text-base flex items-center gap-2.5"><i class="ph-fill ph-user-circle text-blue-500 text-2xl md:text-3xl"></i> ${name}</h4>
                    ${ui}
                </div>`;
            });
        }

        function renderDenda() {
            const list = document.getElementById('denda-list');
            list.innerHTML = '';
            
            const nunggakList = globalPiketData.filter(d => d.status === 'denda_belum' || (d.status === 'belum' && d.dateStr !== todayStr && d.dateStr && d.dateStr.includes('-')));

            if (nunggakList.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center p-6 bg-green-50 text-green-600 font-bold text-xs md:text-sm rounded-[24px] border-2 border-dashed border-green-200">Aman! Tidak ada tim yang nunggak denda. 🎉</div>`;
                return;
            }

            nunggakList.forEach(item => {
                list.innerHTML += `
                    <div class="bg-red-50 p-5 rounded-[24px] border border-red-100 flex justify-between items-center shadow-sm hover:shadow-md transition">
                        <div>
                            <h4 class="font-black text-red-700 text-sm md:text-base flex items-center gap-1.5"><i class="ph-fill ph-warning-circle text-lg"></i> ${item.name}</h4>
                            <div class="text-[9px] md:text-[10px] font-bold text-red-400 mt-1 uppercase tracking-widest"><i class="ph ph-calendar-blank"></i> Tgl Bolos: ${item.dateStr}</div>
                        </div>
                        <span class="bg-red-500 text-white px-3 md:px-4 py-2 md:py-2.5 rounded-xl text-[9px] md:text-[10px] font-black uppercase shadow-sm flex items-center gap-1">Utang 5k</span>
                    </div>
                `;
            });
        }

        function renderKasbon(data) {
            const list = document.getElementById('kasbon-list');
            list.innerHTML = '';
            
            if(!Array.isArray(data) || data.length === 0) { 
                list.innerHTML = `<div class="col-span-full text-center p-6 bg-white rounded-[24px] text-slate-400 font-bold text-xs border-2 border-dashed border-slate-200">Belum ada riwayat pengajuan kasbon.</div>`; 
                return; 
            }

            [...data].reverse().forEach(item => {
                // Filter jika ada baris kosong di Google Sheet
                if (!item.id || !item.name) return;

                let badge = item.status === 'Menunggu' ? `<span class="bg-orange-50 text-orange-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-orange-200 shadow-sm">Menunggu ACC</span>` : `<span class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-blue-200 shadow-sm">Disetujui</span>`;
                
                list.innerHTML += `
                <div class="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-black text-slate-900 text-base mb-1">${item.name}</h4>
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 inline-block px-2 py-1 rounded border border-slate-100"><i class="ph-fill ph-calendar-blank"></i> ${item.dateStr}</div>
                        </div>
                        ${badge}
                    </div>
                    <div class="text-2xl md:text-3xl font-black text-slate-800 tracking-tighter mb-2">${formatRupiah(item.amount)}</div>
                    <div class="text-[11px] md:text-xs text-slate-500 bg-slate-50 p-3 rounded-xl italic border border-slate-100 leading-relaxed">"${item.reason}"</div>
                </div>`;
            });
        }
    </script>
</body>
</html>
