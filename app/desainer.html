<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        // === GOOGLE SHEETS API ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxowuOA-SAq4m4a5sGRljiP8vp7yPkO5QunSGH8WBOJyKiQyGbp_FyY7A6pNGfY6y0rBg/exec";
        async function dbCall(payload) {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            return await res.json();
        }

        let currentUser = localStorage.getItem('moluscaUser');
        
        function initApp() {
            if(!currentUser || localStorage.getItem('moluscaRole') === 'admin') window.location.href = 'index.html';
            document.getElementById('userName').innerText = currentUser;
            loadMyTasks();
        }

        async function loadMyTasks() {
            const res = await dbCall({ action: 'read', sheetName: 'tasks' });
            if(res.status === 'success') {
                const tasks = res.data.filter(t => t.assignee === currentUser);
                renderTasks(tasks);
            }
        }

        async function updateStatus(id, status) { 
            await dbCall({ action: 'update', sheetName: 'tasks', idValue: id, updateData: { status: status } });
            loadMyTasks(); 
        }

        async function sendPrintilan(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;

            const data = {
                id: Date.now().toString(), joCode: 'EXTRA', title: document.getElementById('pTitle').value,
                sender: currentUser, priority: 'Normal', assignee: currentUser,
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                timeAssigned: new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain', isPrintilan: true, isApproved: false
            };
            
            await dbCall({ action: 'insert', sheetName: 'tasks', data: data });
            document.getElementById('pTitle').value = '';
            btn.innerHTML = '<i class="ph-fill ph-paper-plane-right"></i>'; btn.disabled = false;
            loadMyTasks();
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        function renderTasks(myTasks) {
            const active = document.getElementById('active-list'); const final = document.getElementById('final-list');
            active.innerHTML = ''; final.innerHTML = '';

            myTasks.sort((a,b) => a.id - b.id).reverse().forEach(task => {
                const card = document.createElement('div');
                let badge = (task.isPrintilan === "true" && task.isApproved === "false") ? `<div class="text-[9px] bg-yellow-400 font-black px-2 py-1 rounded-md mb-3 inline-flex items-center gap-1 tracking-tighter uppercase"><i class="ph-fill ph-hourglass-high"></i> Waiting Approval</div>` : '';
                let jo = `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg font-black mr-2 uppercase text-[11px] tracking-tighter"><i class="ph ph-hash"></i>${task.joCode}</span>`;

                if(task.status === 'Final') {
                    card.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center text-xs font-bold opacity-70 hover:opacity-100 transition-opacity";
                    card.innerHTML = `<span class="text-slate-400 truncate mr-2">${jo} ${task.title}</span> 
                        <div class="relative shrink-0"><select onchange="updateStatus('${task.id}', this.value)" class="text-[10px] bg-green-50 text-green-600 border border-green-100 py-1 pl-2 pr-6 rounded-md font-black outline-none cursor-pointer appearance-none transition hover:bg-green-100"><option value="Final" selected>✅ FINAL</option><option value="Lagi Dikerjain">⏳ Lagi Dikerjain</option><option value="Nunggu Revisi">✍️ Nunggu Revisi</option><option value="Tinggal Layout">🧩 Tinggal Layout</option></select><i class="ph-fill ph-caret-down absolute right-1.5 top-1/2 -translate-y-1/2 pointer-events-none text-green-600 text-[10px]"></i></div>`;
                    final.appendChild(card);
                } else {
                    let statusColor = "text-blue-600 bg-blue-50/50 border-blue-100";
                    if(task.status === 'Nunggu Revisi') statusColor = "text-red-500 bg-red-50 border-red-100";
                    if(task.status === 'Tinggal Layout') statusColor = "text-orange-500 bg-orange-50 border-orange-100";

                    let isUrgent = task.priority === 'Urgent';
                    let urgentUI = isUrgent ? `<span class="text-[10px] font-black text-red-500 uppercase flex items-center gap-1 bg-red-50 px-2 py-1 rounded-md animate-pulse border border-red-200 shadow-[0_0_10px_rgba(239,68,68,0.5)]"><i class="ph-fill ph-warning-circle"></i> URGENT</span>` : '';

                    card.className = `bg-white p-6 rounded-[32px] border shadow-sm flex flex-col gap-4 transition-all ${isUrgent ? 'border-red-300 shadow-red-100 ring-2 ring-red-50' : 'border-slate-100'}`;
                    card.innerHTML = `${badge}<div class="flex justify-between items-center"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><i class="ph ph-calendar-blank"></i> ${task.dateStr} | ${task.timeAssigned} WIB</div>${urgentUI}</div>
                        <h4 class="font-black text-xl leading-tight text-slate-900 tracking-tighter mt-1">${jo} ${task.title}</h4>
                        <div class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest flex items-center gap-1"><i class="ph-fill ph-paper-plane-tilt"></i> From: ${task.sender}</div>
                        <div class="relative"><select onchange="updateStatus('${task.id}', this.value)" class="w-full border p-4 rounded-[20px] font-black text-sm outline-none cursor-pointer transition appearance-none pl-10 ${statusColor}"><option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option><option value="Nunggu Revisi" ${task.status === 'Nunggu Revisi' ? 'selected' : ''}>✍️ Nunggu Revisi</option><option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option><option value="Final" ${task.status === 'Final' ? 'selected' : ''}>✅ Final</option></select><i class="ph-fill ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i></div>`;
                    active.appendChild(card);
                }
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md px-6 py-5 border-b border-slate-100 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] flex items-center gap-2"><i class="ph-fill ph-hexagon text-blue-600 text-lg"></i> Molusca | <span id="userName" class="text-blue-600">...</span></h1>
        <div class="flex items-center gap-2 flex-wrap justify-end">
            <a href="izin.html" class="text-[10px] md:text-xs font-bold text-red-500 bg-red-50 px-3 md:px-4 py-2 rounded-xl flex items-center gap-1 hover:bg-red-100"><i class="ph-fill ph-first-aid text-sm md:text-base"></i> <span class="hidden md:inline">IZIN</span></a>
            <a href="piket.html" class="text-[10px] md:text-xs font-bold text-amber-500 bg-amber-50 px-3 md:px-4 py-2 rounded-xl flex items-center gap-1 hover:bg-amber-100"><i class="ph-fill ph-broom text-sm md:text-base"></i> <span class="hidden md:inline">PIKET</span></a>
            <a href="peminjaman.html" class="text-[10px] md:text-xs font-bold text-indigo-600 bg-indigo-50 px-3 md:px-4 py-2 rounded-xl flex items-center gap-1 hover:bg-indigo-100"><i class="ph-fill ph-package text-sm md:text-base"></i> <span class="hidden md:inline">INVENTARIS</span></a>
           
            <button onclick="logout()" class="text-[10px] md:text-xs font-bold text-slate-500 bg-slate-100 px-3 md:px-4 py-2 rounded-xl hover:bg-slate-200 flex items-center gap-1"><i class="ph-fill ph-sign-out text-sm md:text-base"></i></button>
        </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-10">
        <section class="bg-slate-900 p-6 rounded-[32px] shadow-xl shadow-slate-200">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-1"><i class="ph-fill ph-lightning text-yellow-500 text-sm"></i> Lapor Tugas Manual</h3>
            <form onsubmit="sendPrintilan(event)" class="flex gap-2">
                <input type="text" id="pTitle" required placeholder="Deskripsi tugas extra..." autocomplete="off" class="flex-grow bg-white/10 border-none px-4 py-3 text-white text-sm rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase flex items-center gap-1 hover:bg-blue-500 transition"><i class="ph-fill ph-paper-plane-right"></i></button>
            </form>
        </section>

        <div>
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6 ml-1 flex items-center gap-2"><i class="ph-fill ph-kanban text-lg"></i> Active Projects</h3>
            <div id="active-list" class="space-y-6"></div>
        </div>
        
        <div class="pt-8 opacity-50 hover:opacity-100 transition">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6 ml-1 flex items-center gap-2"><i class="ph-fill ph-check-circle text-lg"></i> Completed</h3>
            <div id="final-list" class="space-y-4"></div>
        </div>
    </main>
</body>
</html>
