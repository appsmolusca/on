<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Manage Users - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="checkLogin()" oncontextmenu="return false;">
    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            if (localStorage.getItem('moluscaRole') !== 'admin') window.location.href = 'index.html';
            loadUsers();
        }

        async function saveUser(e) {
            e.preventDefault();
            const username = document.getElementById('uID').value.toLowerCase().trim();
            const userData = {
                name: document.getElementById('uName').value,
                password: document.getElementById('uPass').value,
                role: document.getElementById('uRole').value
            };
            db.ref('users/' + username).set(userData);
            document.getElementById('userForm').reset();
            alert("Berhasil! User tersimpan.");
        }

        function deleteUser(username) {
            if(username === 'admin') { alert("Akun Admin tidak boleh dihapus!"); return; }
            if(confirm(`Yakin ingin menghapus akses login untuk ${username}?`)) {
                db.ref('users/' + username).remove();
            }
        }

        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    Object.keys(data).forEach(key => {
                        const user = data[key];
                        
                        let icon = '<i class="ph-fill ph-user text-blue-500"></i>';
                        if (user.role === 'admin') icon = '<i class="ph-fill ph-crown text-yellow-500"></i>';
                        if (user.role === 'konten kreator') icon = '<i class="ph-fill ph-camera text-pink-500"></i>';

                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <div class="bg-slate-50 w-12 h-12 flex items-center justify-center rounded-xl text-xl">${icon}</div>
                                    <div>
                                        <h4 class="font-black text-slate-900">${user.name} <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-widest ml-1">${user.role}</span></h4>
                                        <div class="text-xs text-slate-400 font-bold mt-1">User: <span class="text-blue-500">${key}</span> | Pass: <span class="text-blue-500">${user.password}</span></div>
                                    </div>
                                </div>
                                <button onclick="deleteUser('${key}')" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="ph-fill ph-trash text-xl"></i></button>
                            </div>
                        `;
                    });
                }
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-users text-2xl text-blue-600"></i>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Kelola Tim</h1>
        </div>
        <a href="dashboard.html" class="text-xs font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-xl flex items-center gap-1 hover:bg-slate-200"><i class="ph-fill ph-arrow-left"></i> Kembali</a>
    </header>

    <main class="p-4 md:p-8 max-w-4xl mx-auto space-y-10">
        <section class="bg-slate-900 p-8 rounded-[32px] shadow-xl shadow-slate-200">
            <h2 class="text-sm font-black text-white uppercase tracking-widest mb-6 flex items-center gap-2"><i class="ph-fill ph-user-plus text-blue-400 text-lg"></i> Tambah / Edit Tim</h2>
            <form id="userForm" onsubmit="saveUser(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2 ml-1">Username Login (Tanpa Spasi)</label>
                    <input type="text" id="uID" required placeholder="cth: budi" class="w-full bg-white/10 border-none rounded-2xl p-4 text-white font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2 ml-1">Nama Tampilan</label>
                    <input type="text" id="uName" required placeholder="cth: Budi Santoso" class="w-full bg-white/10 border-none rounded-2xl p-4 text-white font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2 ml-1">Password</label>
                    <input type="text" id="uPass" required placeholder="cth: molusca123" class="w-full bg-white/10 border-none rounded-2xl p-4 text-white font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2 ml-1">Role (Jabatan)</label>
                    <select id="uRole" class="w-full bg-white/10 border-none rounded-2xl p-4 text-white font-bold outline-none appearance-none">
                        <option value="desainer" class="text-slate-900">Desainer</option>
                        <option value="konten kreator" class="text-slate-900">Konten Kreator</option>
                        <option value="admin" class="text-slate-900">Admin / Lead</option>
                    </select>
                </div>
                <button type="submit" class="md:col-span-2 mt-2 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition uppercase tracking-widest text-xs flex justify-center items-center gap-2"><i class="ph-fill ph-floppy-disk"></i> Simpan Akun</button>
            </form>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6 flex items-center gap-2"><i class="ph-fill ph-address-book text-lg"></i> Daftar Akses Tim</h2>
            <div id="user-list" class="space-y-4"></div>
        </section>
    </main>
</body>
</html>
