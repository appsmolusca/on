<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-6" oncontextmenu="return false;">

    <div class="w-full max-w-md bg-white p-10 rounded-[32px] shadow-sm border border-gray-100 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
        <div class="text-center mb-10 mt-2">
            <i class="ph-fill ph-hexagon text-5xl text-blue-600 mb-2"></i>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Molusca<span class="text-blue-600">.</span></h1>
            <p class="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-[0.3em]">Project Management</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div class="relative">
                <i class="ph ph-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="username" required placeholder="Username" autocomplete="off" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 font-medium lowercase">
            </div>
            <div class="relative">
                <i class="ph ph-lock-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="password" id="password" required placeholder="Password" autocomplete="off" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 font-medium">
            </div>
            <button type="submit" id="btnSubmit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-slate-200 uppercase text-xs tracking-widest flex justify-center items-center gap-2">
                Sign In <i class="ph ph-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        // URL GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxowuOA-SAq4m4a5sGRljiP8vp7yPkO5QunSGH8WBOJyKiQyGbp_FyY7A6pNGfY6y0rBg/exec";

        // Cek jika sudah login
        if(localStorage.getItem('moluscaUser')) {
            if(localStorage.getItem('moluscaRole') === 'admin') window.location.href = 'dashboard.html';
            else window.location.href = 'desainer.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Memeriksa...';
            btn.disabled = true;
            
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read', sheetName: 'users' })
                });
                const responseData = await res.json();
                
                let foundUser = responseData.data.find(u => u.username === user);

                if (foundUser) {
                    if (foundUser.password === pass) {
                        localStorage.setItem('moluscaUser', foundUser.name);
                        localStorage.setItem('moluscaRole', foundUser.role);
                        
                        if (foundUser.role === 'admin') window.location.href = 'dashboard.html';
                        else window.location.href = 'desainer.html';
                    } else {
                        alert('Password salah!');
                        resetBtn(btn);
                    }
                } else {
                    alert('Username tidak ditemukan di database Google Sheets!');
                    resetBtn(btn);
                }
            } catch(err) {
                alert('Gagal terhubung ke server.');
                resetBtn(btn);
            }
        });

        function resetBtn(btn) {
            btn.innerHTML = 'Sign In <i class="ph ph-arrow-right"></i>';
            btn.disabled = false;
        }
    </script>
</body>
</html>
